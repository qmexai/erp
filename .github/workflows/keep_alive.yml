name: "Render Keep-Alive"

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          echo "Pinging the backend to prevent sleep..."
          curl -s -o /dev/null -w "%{http_code}" https://erp-e1ax.onrender.com/health/
